<svg viewBox="0 0 200 280" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4757;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Location Pin Shape -->
  <path d="M 100 10 C 145 10 180 45 180 90 C 180 140 100 220 100 220 C 100 220 20 140 20 90 C 20 45 55 10 100 10 Z" fill="url(#pinGradient)" stroke="#ff3838" stroke-width="1"/>
  
  <!-- Paw print inside the pin -->
  <g transform="translate(100, 65)">
    <!-- Main pad (center bottom) -->
    <circle cx="0" cy="12" r="7" fill="#000000"/>
    
    <!-- Upper left toe -->
    <circle cx="-16" cy="-5" r="6" fill="#000000"/>
    
    <!-- Upper middle-left toe -->
    <circle cx="-8" cy="-11" r="6" fill="#000000"/>
    
    <!-- Upper middle-right toe -->
    <circle cx="8" cy="-11" r="6" fill="#000000"/>
    
    <!-- Upper right toe -->
    <circle cx="16" cy="-5" r="6" fill="#000000"/>
  </g>
</svg>