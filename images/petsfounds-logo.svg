<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="gradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF8E72;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="gradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4ECDC4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#44A08D;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="95" fill="#f8f9fa" stroke="#e9ecef" stroke-width="2"/>
  
  <!-- Paw print - main -->
  <g id="paw">
    <!-- Main pad (bottom center) -->
    <circle cx="100" cy="130" r="18" fill="url(#gradient1)"/>
    
    <!-- Upper left toe -->
    <circle cx="70" cy="85" r="14" fill="url(#gradient2)"/>
    
    <!-- Upper middle-left toe -->
    <circle cx="90" cy="75" r="14" fill="url(#gradient1)"/>
    
    <!-- Upper middle-right toe -->
    <circle cx="110" cy="75" r="14" fill="url(#gradient2)"/>
    
    <!-- Upper right toe -->
    <circle cx="130" cy="85" r="14" fill="url(#gradient1)"/>
  </g>
  
  <!-- Magnifying glass handle (search concept) -->
  <line x1="140" y1="140" x2="170" y2="170" stroke="#4ECDC4" stroke-width="8" stroke-linecap="round" opacity="0.7"/>
  
  <!-- Text -->
  <text x="100" y="185" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="14" font-weight="700" text-anchor="middle" fill="#2d3748" letter-spacing="0.5">PETSFOUNDS</text>
</svg>