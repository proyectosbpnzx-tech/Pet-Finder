<svg viewBox="0 0 400 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="pinGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF6B6B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FF4757;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Location Pin Shape -->
  <path d="M 200 20 C 260 20 310 70 310 140 C 310 220 200 380 200 380 C 200 380 90 220 90 140 C 90 70 140 20 200 20 Z" fill="url(#pinGradient)" stroke="#ff3838" stroke-width="2"/>
  
  <!-- Paw print inside the pin -->
  <g transform="translate(200, 100)">
    <!-- Main pad (center bottom) -->
    <circle cx="0" cy="20" r="12" fill="#000000"/>
    
    <!-- Upper left toe -->
    <circle cx="-28" cy="-8" r="10" fill="#000000"/>
    
    <!-- Upper middle-left toe -->
    <circle cx="-14" cy="-18" r="10" fill="#000000"/>
    
    <!-- Upper middle-right toe -->
    <circle cx="14" cy="-18" r="10" fill="#000000"/>
    
    <!-- Upper right toe -->
    <circle cx="28" cy="-8" r="10" fill="#000000"/>
  </g>
  
  <!-- Text: PetsFounds -->
  <text x="200" y="450" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="48" font-weight="800" text-anchor="middle" fill="#ffffff" letter-spacing="1">PetsFounds</text>
</svg>